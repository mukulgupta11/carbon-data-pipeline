services:
  # Backend Web Service
  - type: web
    name: breathe-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

  # Frontend Static Site
  - type: web
    name: breathe-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: NODE_VERSION
        value: 20.12.2
      - key: VITE_API_URL
        value: "https://breathe-backend.onrender.com/api/"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
